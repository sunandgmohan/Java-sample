apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
  template:
    metadata:
      labels:
        app: java-app
    spec:
      containers:
      - name: java-app
        image: 369343193331.dkr.ecr.us-east-1.amazonaws.com/java-sample:latest
        ports:
        - containerPort: 8080
